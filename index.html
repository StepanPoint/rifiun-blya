<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RIFIUN_BLYA_DATABASE_V3</title>
  <style>
    :root {
      --neon: #0f0;
      --neon-dim: #0a0;
      --bg: #000;
      --panel: rgba(0, 15, 0, 0.85);
      --border: #0f0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Courier New', monospace;
      background: var(--bg) url('https://images.unsplash.com/photo-1518066000714-58c45f1a2c0a?q=80&w=2070&auto=format&fit=crop') center/cover fixed;
      color: var(--neon);
      min-height: 100vh;
      padding: 20px;
      text-shadow: 0 0 4px var(--neon), 0 0 10px rgba(0,255,0,0.4);
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        0deg, rgba(0,40,0,0.05) 0px, rgba(0,40,0,0.05) 1px, transparent 1px, transparent 3px
      );
      pointer-events: none; z-index: -1;
    }

    .container {
      max-width: 900px; margin: 0 auto;
      border: 1px solid var(--border);
      box-shadow: 0 0 25px var(--neon), inset 0 0 20px rgba(0,255,0,0.1);
      background: var(--panel);
      padding: 20px; position: relative;
    }

    /* CRT scanline effect */
    .container::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      background-size: 100% 4px, 6px 100%; pointer-events: none; z-index: 2;
    }

    .content { position: relative; z-index: 3; }

    .header { text-align: center; padding: 15px 0 10px; border-bottom: 1px dashed var(--neon-dim); margin-bottom: 15px; }
    .header h1 { font-size: 1.8rem; letter-spacing: 4px; animation: flicker 4s infinite; }
    .header .sub { font-size: 0.85rem; opacity: 0.8; margin-top: 5px; }

    @keyframes flicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
      20%, 24%, 55% { opacity: 0.6; text-shadow: 0 0 15px var(--neon); }
    }

    .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.8rem; padding: 8px 12px; background: rgba(0, 25, 0, 0.5);
      border: 1px solid var(--neon-dim); margin-bottom: 15px;
    }
    .status-bar .hint { color: var(--neon); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

    /* 🔥 РЕДАКТИРУЕМАЯ ОБЛАСТЬ */
    #results-db {
      min-height: 180px; padding: 15px; border: 1px solid var(--neon-dim);
      background: rgba(0, 15, 0, 0.6); line-height: 1.8; font-size: 1.1rem;
      cursor: text; white-space: pre-wrap; word-wrap: break-word;
      outline: none; transition: all 0.2s;
    }
    #results-db:focus {
      border-color: var(--neon);
      box-shadow: 0 0 12px var(--neon), inset 0 0 15px rgba(0,255,0,0.15);
    }
    #results-db:empty::before {
      content: "Начните вводить текст...";
      color: #0a0; opacity: 0.6; font-style: italic;
    }

    /* Стили для слов */
    .word-token { cursor: pointer; transition: all 0.15s; padding: 1px 3px; border-radius: 3px; display: inline; }
    .word-token:hover { background: rgba(0, 255, 0, 0.25); box-shadow: 0 0 8px var(--neon); }
    .word-token.selected {
      background: var(--neon) !important; color: #000 !important;
      font-weight: bold; box-shadow: 0 0 12px var(--neon); text-shadow: none !important;
    }

    /* Панель рифм */
    #rhyme-panel {
      margin-top: 20px; padding: 12px; border-left: 3px solid var(--neon);
      background: rgba(0, 20, 0, 0.7); min-height: 50px; font-size: 0.95rem;
      display: none; animation: slideIn 0.3s ease;
    }
    #rhyme-panel.active { display: block; }
    @keyframes slideIn { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }

    .rhyme-title { color: var(--neon); font-weight: bold; margin-bottom: 8px; }
    .rhyme-list { color: #0c0; display: flex; flex-wrap: wrap; gap: 6px; }
    .rhyme-chip {
      display: inline-block; margin: 2px; padding: 4px 8px;
      background: rgba(0, 80, 0, 0.4); border: 1px solid var(--neon-dim);
      border-radius: 4px; cursor: pointer; transition: all 0.2s; font-size: 0.9rem;
    }
    .rhyme-chip:hover { background: rgba(0, 255, 0, 0.2); border-color: var(--neon); transform: scale(1.05); }
    .rhyme-chip.copied { background: var(--neon) !important; color: #000 !important; }

    .error { color: #f55; text-shadow: 0 0 5px #f55; }
    .loading { color: var(--neon); animation: blink 1s infinite; }
    @keyframes blink { 0%,50%{opacity:1} 51%,100%{opacity:0.4} }

    .quote {
      margin-top: 25px; padding-top: 15px; border-top: 1px dashed var(--neon-dim);
      font-style: italic; opacity: 0.85; font-size: 0.95rem; text-align: center;
    }

    /* Адаптив */
    @media (max-width: 600px) {
      .container { padding: 10px; }
      .header h1 { font-size: 1.4rem; }
      .status-bar { flex-direction: column; gap: 5px; text-align: center; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="content">
      <div class="header">
        <h1>RIFIUN BLYA</h1>
        <div class="sub">DATABASE_V3 // LOADED // NO_CENSORSHIP_EXCEPT_HASH</div>
      </div>

      <div class="status-bar">
        <span>my_soul.txt <span style="color:#0a0">UNSAVED</span></span>
        <span>WORDS: <span id="word-count">0</span></span>
        <span class="hint">CTRL + ENTER = SCAN СКАНИРОВАТЬ БАЗУ</span>
      </div>

      <!-- 🔥 contenteditable="true" исправляет баг с вводом -->
      <div id="results-db" contenteditable="true" spellcheck="false" placeholder="Введите текст...">Ожидание ввода...(введи слово и нажми поиск)</div>

      <div id="rhyme-panel">
        <div class="rhyme-title">🔍 РИФМЫ:</div>
        <div class="rhyme-list" id="rhyme-list"></div>
      </div>

      <div class="quote">"В этом городе даже снег пахнет пеплом и безысходностью."</div>
    </div>
  </div>

  <script>
    // === КОНФИГУРАЦИЯ ===
    const dbEl = document.getElementById('results-db');
    const rhymePanel = document.getElementById('rhyme-panel');
    const rhymeList = document.getElementById('rhyme-list');
    const wordCountEl = document.getElementById('word-count');

    // Мини-база рифм по окончаниям (можно расширить)
    const RHYME_DB = {
      'а': ['а', 'я', 'ка', 'та', 'на', 'ма', 'ла', 'да', 'ра', 'жа', 'слава', 'трава', 'голова'],
      'я': ['я', 'мя', 'ня', 'бя', 'вя', 'дя', 'зя', 'ля', 'ря', 'семья', 'земля', 'друзья'],
      'о': ['о', 'го', 'ло', 'но', 'то', 'со', 'ро', 'ко', 'до', 'по', 'окно', 'дно', 'оно'],
      'е': ['е', 'те', 'не', 'ле', 'ре', 'се', 'ве', 'де', 'ке', 'ме', 'небо', 'хлеб', 'тревога'],
      'и': ['и', 'ти', 'ни', 'ли', 'ри', 'си', 'ви', 'ди', 'ки', 'ми', 'крови', 'любви', 'травы'],
      'ы': ['ы', 'ты', 'ны', 'лы', 'ры', 'сы', 'вы', 'ды', 'кы', 'мы', 'весы', 'часы', 'леса'],
      'ой': ['ой', 'герой', 'покой', 'бой', 'строй', 'зной', 'душой', 'судьбой', 'водой', 'мечтой'],
      'ай': ['ай', 'край', 'рай', 'май', 'знай', 'давай', 'играй', 'вставай', 'летай', 'мечтай'],
      'ок': ['ок', 'срок', 'восток', 'поток', 'сучок', 'теремок', 'песок', 'ледок', 'ветерок'],
      'ас': ['ас', 'класс', 'глаз', 'раз', 'сейчас', 'приказ', 'рассказ', 'бас', 'контраст'],
      'ет': ['ет', 'свет', 'ответ', 'привет', 'рассвет', 'поэт', 'балет', 'билет', 'портрет'],
      'ить': ['ить', 'любить', 'жить', 'быть', 'просить', 'носить', 'ходить', 'варить', 'говорить'],
      'ать': ['ать', 'знать', 'ждать', 'дать', 'стать', 'брать', 'гнать', 'рвать', 'летать', 'мечтать']
    };

    // Стоп-слова (пропускаются при клике, но остаются в тексте)
    const STOP_WORDS = new Set(['и','в','на','не','с','к','по','о','а','но','да','же','ли','что','как','бы','то','же','ли','я','ты','он','она','оно','мы','вы','они','мой','твой','свой','наш','ваш','его','её','их']);

    // === УТИЛИТЫ ===
    function tokenize(text) {
      return text.split(/(\s+|[^\wа-яА-ЯёЁ]+)/).filter(t => t);
    }

    // Сохранение/восстановление курсора (для contenteditable)
    function saveCursor(container) {
      const sel = window.getSelection();
      if (!sel.rangeCount) return 0;
      const range = sel.getRangeAt(0);
      const pre = document.createRange();
      pre.selectNodeContents(container);
      pre.setEnd(range.startContainer, range.startOffset);
      return pre.toString().length;
    }

    function restoreCursor(container, offset) {
      const sel = window.getSelection();
      const charIndex = { count: 0 };
      const stack = [container];
      let startNode, startOffset, found = false;

      while (stack.length && !found) {
        const node = stack.pop();
        if (node.nodeType === 3) {
          const next = charIndex.count + node.length;
          if (offset >= charIndex.count && offset <= next) {
            startNode = node;
            startOffset = offset - charIndex.count;
            found = true;
            break;
          }
          charIndex.count = next;
        } else {
          for (let i = node.childNodes.length - 1; i >= 0; i--) stack.push(node.childNodes[i]);
        }
      }

      const newRange = document.createRange();
      newRange.setStart(startNode || container, startOffset || 0);
      newRange.collapse(true);
      sel.removeAllRanges();
      sel.addRange(newRange);
    }

    // === РЕНДЕР СЛОВ ===
    function renderWords() {
      const offset = saveCursor(dbEl);
      const text = dbEl.textContent;
      const tokens = tokenize(text);
      let count = 0;

      dbEl.innerHTML = tokens.map(t => {
        if (/^[\wа-яА-ЯёЁ]{2,}$/.test(t) && !STOP_WORDS.has(t.toLowerCase())) {
          count++;
          return `<span class="word-token" data-word="${t.replace(/"/g, '&quot;')}">${t}</span>`;
        }
        return t;
      }).join('');

      wordCountEl.textContent = count;

      // Навешиваем события
      dbEl.querySelectorAll('.word-token').forEach(span => {
        span.addEventListener('click', (e) => {
          e.stopPropagation();
          selectWord(e.currentTarget);
        });
      });

      restoreCursor(dbEl, offset);
    }

    // === ВЫДЕЛЕНИЕ И ПОИСК РИФМ ===
    function selectWord(el) {
      dbEl.querySelectorAll('.word-token.selected').forEach(s => s.classList.remove('selected'));
      el.classList.add('selected');
      findRhymes(el.dataset.word);
    }

    function findRhymes(word) {
      rhymePanel.classList.add('active');
      rhymeList.innerHTML = '<span class="loading">⚡ СКАНИРОВАНИЕ БАЗЫ...</span>';

      setTimeout(() => {
        const lower = word.toLowerCase();
        const matches = new Set();

        for (const [end, list] of Object.entries(RHYME_DB)) {
          if (lower.endsWith(end)) {
            list.forEach(w => w.toLowerCase() !== lower && matches.add(w));
            break;
          }
        }

        // Фолбэк: генерация по суффиксу
        if (matches.size === 0 && lower.length >= 3) {
          const suf = lower.slice(-2);
          ['пр','ст','кр','бр','тр','др','гр','зр','мр','вл','пл'].forEach(p => {
            if (p + suf !== lower) matches.add(p + suf);
          });
        }

        if (matches.size === 0) {
          rhymeList.innerHTML = `<span class="error">🤔 Рифм к "${word}" в базе не найдено</span>`;
          return;
        }

        rhymeList.innerHTML = Array.from(matches).slice(0, 12).map(r => 
          `<span class="rhyme-chip" data-rhyme="${r}">${r}</span>`
        ).join('');

        // Копирование по клику
        rhymeList.querySelectorAll('.rhyme-chip').forEach(chip => {
          chip.addEventListener('click', (e) => {
            navigator.clipboard?.writeText(e.currentTarget.dataset.rhyme);
            e.currentTarget.textContent = '✓';
            e.currentTarget.classList.add('copied');
            setTimeout(() => {
              e.currentTarget.textContent = e.currentTarget.dataset.rhyme;
              e.currentTarget.classList.remove('copied');
            }, 600);
          });
        });
      }, 250);
    }

    // === ГОРЯЧИЕ КЛАВИШИ ===
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'Enter') {
        e.preventDefault();
        const sel = window.getSelection().toString().trim();
        if (sel.length >= 2) {
          findRhymes(sel);
          return;
        }
        const active = document.querySelector('.word-token.selected');
        if (active) {
          findRhymes(active.dataset.word);
        } else {
          rhymePanel.classList.add('active');
          rhymeList.innerHTML = '<span class="error">⚠ Выделите слово или нажмите CTRL+ENTER при выделении текста</span>';
        }
      }
    });

    // === ИНИЦИАЛИЗАЦИЯ ===
    let inputTimer;
    dbEl.addEventListener('input', () => {
      clearTimeout(inputTimer);
      inputTimer = setTimeout(renderWords, 300); // debounce для плавности ввода
    });

    // Клик вне слов снимает выделение
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.word-token') && !e.target.closest('#rhyme-panel')) {
        document.querySelectorAll('.word-token.selected').forEach(s => s.classList.remove('selected'));
      }
    });

    // Стартовый рендер
    document.addEventListener('DOMContentLoaded', () => {
      renderWords();
      setTimeout(() => {
        if (dbEl.textContent.trim().length < 5) {
          rhymePanel.classList.add('active');
          rhymeList.innerHTML = '💡 <em>Начните печатать или кликните на слово для поиска рифмы</em>';
        }
      }, 1200);
    });
  </script>
</body>
</html>
