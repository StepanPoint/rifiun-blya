<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOOMER_RHYME_2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap');

        :root {
            --bg-color: #050505;
            --terminal-bg: #0a0a0a;
            --neon-blue: #4deeea;
            --neon-pink: #ff0055;
            --text-dim: #6b7c85;
            --scanline: rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Share Tech Mono', monospace;
            background-color: var(--bg-color);
            color: #aabbc3;
            overflow-x: hidden;
            height: 100vh;
            margin: 0;
        }

        /* Эффект шума (Noise) */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
            opacity: 0.08;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* CRT Scanlines */
        .crt::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 40;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* Снег */
        .snow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* Терминал */
        .terminal-window {
            background: rgba(12, 12, 14, 0.95);
            border: 1px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            position: relative;
        }

        .terminal-header {
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #666;
        }

        textarea {
            background: transparent;
            color: #d1d5db;
            font-family: 'VT323', monospace;
            font-size: 1.4rem;
            line-height: 1.4;
            caret-color: var(--neon-pink);
        }
        
        textarea::selection {
            background: var(--neon-pink);
            color: #000;
        }

        /* Кнопки и элементы */
        .doomer-btn {
            background: #111;
            border: 1px solid #444;
            color: #888;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .doomer-btn:hover {
            border-color: var(--neon-blue);
            color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(77, 238, 234, 0.2);
            cursor: pointer;
        }

        .rhyme-item {
            border-left: 2px solid #333;
            transition: all 0.2s;
        }
        
        .rhyme-item:hover {
            border-left-color: var(--neon-pink);
            background: rgba(255, 0, 85, 0.05);
            padding-left: 10px;
            color: #fff;
        }

        /* Анимации */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .cursor-blink {
            animation: blink 1s step-end infinite;
        }

        /* Скроллбар */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #333; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        .glitch-text {
            position: relative;
        }
        
        .sad-quote {
            font-style: italic;
            color: #555;
            font-size: 0.9rem;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body class="crt">
    <div class="noise-overlay"></div>
    
    <!-- Фон: Панелька в сумерках -->
    <div class="fixed inset-0 z-0">
        <img src="https://images.unsplash.com/photo-1518066000714-58c45f1a2c0a?q=80&w=2070&auto=format&fit=crop" 
             class="w-full h-full object-cover opacity-30 grayscale contrast-125 brightness-50" alt="panelka">
        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/80 to-transparent"></div>
    </div>

    <canvas id="snow" class="snow"></canvas>

    <div class="relative z-20 min-h-screen flex flex-col items-center justify-center p-4">
        
        <!-- Заголовок -->
        <header class="mb-8 text-center">
            <h1 class="text-5xl md:text-7xl font-bold tracking-tighter text-gray-300 mb-2" style="font-family: 'VT323', monospace;">
                RIFIUN <span class="text-[#ff0055]">BLYA</span>
            </h1>
            <div class="flex items-center justify-center gap-2 text-xs text-gray-500 uppercase tracking-widest">
                <span class="w-2 h-2 rounded-full bg-green-900 animate-pulse"></span>
                Система: Онлайн // Год: 2026 // Настроение: Тоска
            </div>
        </header>

        <!-- Основной интерфейс -->
        <div class="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- Левая часть: Редактор -->
            <div class="lg:col-span-8 terminal-window rounded-sm flex flex-col h-[60vh] lg:h-[70vh]">
                <div class="terminal-header">
                    <span><i class="fas fa-file-code mr-2"></i>notes.txt</span>
                    <span class="text-[#ff0055]">UNSAVED</span>
                </div>
                <textarea id="editor" class="flex-1 p-6 outline-none resize-none w-full" 
                    placeholder="Пиши сюда...&#10;Снег идет второй день...&#10;Панельки давят..."></textarea>
                <div class="p-2 border-t border-[#333] flex justify-between text-xs text-gray-600 bg-[#0a0a0a]">
                    <span id="word-count">WORDS: 0</span>
                    <span>CTRL + ENTER = SEARCH</span>
                </div>
            </div>

            <!-- Правая часть: Рифмы и Атмосфера -->
            <div class="lg:col-span-4 flex flex-col gap-4">
                
                <!-- Панель управления -->
                <div class="terminal-window rounded-sm p-4">
                    <button onclick="getRhymes()" class="doomer-btn w-full py-3 px-4 flex items-center justify-center gap-2 mb-2">
                        <i class="fas fa-search"></i> НАЙТИ РИФМУ
                    </button>
                    <div id="status-line" class="h-4 text-xs text-center text-gray-500 font-mono"></div>
                </div>

                <!-- Список рифм -->
                <div class="terminal-window rounded-sm flex-1 p-0 overflow-hidden flex flex-col">
                    <div class="terminal-header bg-[#111]">
                        <span>RESULTS_DB</span>
                        <i class="fas fa-database"></i>
                    </div>
                    <div id="rhymes-container" class="p-2 overflow-y-auto flex-1 space-y-1">
                        <div class="text-center text-gray-600 mt-10 text-sm italic">
                            Ожидание ввода...<br>
                            <span class="text-[10px] opacity-50">(введи слово и нажми поиск)</span>
                        </div>
                    </div>
                </div>

                <!-- Цитата дня -->
                <div class="p-2 text-center">
                    <p class="sad-quote">"Мы живем в панельных муравейниках, чтобы забыть, что мы одиноки."</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- ЗВУКОВОЙ ДВИЖОК (Web Audio API) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'click') {
                // Механический клик
                osc.type = 'square';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05);
                gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
            } else if (type === 'hover') {
                // Тихий писк
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.02, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.05);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
            } else if (type === 'error') {
                // Низкий гул ошибки
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'success') {
                // Приятный "дзынь"
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        // --- ЛОГИКА РИФМ ---
        const rhymeDB = {
            "снег": ["бег", "век", "плен", "тлен", "день", "тень", "огонь", "конь", "брег"],
            "город": ["холод", "голод", "поворот", "лёд", "народ", "вход", "выход", "метод", "счёт"],
            "ночь": ["дочь", "прочь", "мощь", "ложь", "точь", "помощь", "брошь", "рожь"],
            "мир": ["пир", "сир", "тир", "эфир", "кумир", "вампиры", "инжир"],
            "любовь": ["кровь", "вновь", "бровь", "морковь", "основа", "обнов", "слово"],
            "глаза": ["гроза", "слеза", "коза", "фраза", "база", "назад", "алмаз", "экран"],
            "рука": ["река", "тоска", "мука", "века", "пока", "строка", "знака", "звука"],
            "дождь": ["дрожь", "молодёжь", "стреж", "еж", "нож", "плащ"],
            "панелька": ["трещелка", "колыбелька", "стрелялка", "качелька"],
            "подъезд": ["съезд", "крест", "место", "текст", "арест", "лесть"]
        };

        const vowels = ['а', 'е', 'ё', 'и', 'о', 'у', 'ы', 'э', 'ю', 'я'];

        function getLastWord(text) {
            if (!text) return '';
            const cleanText = text.trim().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");
            const words = cleanText.split(/\s+/);
            return words[words.length - 1].toLowerCase();
        }

        function getEnding(word) {
            for (let i = word.length - 1; i >= 0; i--) {
                if (vowels.includes(word[i])) {
                    return word.substring(i);
                }
            }
            return word;
        }

        function updateWordCount() {
            const text = document.getElementById('editor').value;
            const count = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
            document.getElementById('word-count').innerText = `WORDS: ${count}`;
        }

        function getRhymes() {
            const text = document.getElementById('editor').value;
            const lastWord = getLastWord(text);
            const container = document.getElementById('rhymes-container');
            const status = document.getElementById('status-line');
            
            container.innerHTML = '';
            playSound('click');

            if (!lastWord) {
                status.innerText = "ERROR: EMPTY_BUFFER";
                status.style.color = "#ff0055";
                playSound('error');
                return;
            }

            status.innerText = `SCANNING_FOR: [${lastWord.toUpperCase()}]...`;
            status.style.color = "#4deeea";

            let found = [];

            // 1. Прямой поиск
            if (rhymeDB[lastWord]) {
                found = rhymeDB[lastWord];
            } else {
                // 2. Поиск по окончанию
                const targetEnd = getEnding(lastWord);
                Object.keys(rhymeDB).forEach(key => {
                    if (getEnding(key) === targetEnd && key !== lastWord) {
                        found.push(key);
                        found = found.concat(rhymeDB[key]);
                    }
                });
                found = [...new Set(found)].filter(w => w !== lastWord);
            }

            // 3. Если пусто - депрессивный рандом
            if (found.length === 0) {
                found = ["тьма", "зима", "дыра", "нора", "пустота", "ничто", "бетон"];
                status.innerText = "NO_DATA_FOUND. LOADING_DEFAULT_SADNESS...";
                playSound('error');
            } else {
                playSound('success');
            }

            // Рендер
            found.forEach((word, index) => {
                setTimeout(() => {
                    const div = document.createElement('div');
                    div.className = "rhyme-item p-2 cursor-pointer text-gray-400 hover:text-white font-mono text-lg flex justify-between";
                    div.innerHTML = `<span>> ${word}</span> <span class="text-[10px] opacity-30">ADD</span>`;
                    
                    div.onmouseenter = () => playSound('hover');
                    div.onclick = () => {
                        const editor = document.getElementById('editor');
                        if (editor.value.length > 0 && !editor.value.endsWith('\n') && !editor.value.endsWith(' ')) {
                            editor.value += " ";
                        }
                        editor.value += word;
                        editor.focus();
                        updateWordCount();
                        playSound('click');
                    };
                    container.appendChild(div);
                }, index * 30); // Эффект печатания списка
            });
        }

        // --- СНЕГ ---
        function createSnow() {
            const canvas = document.getElementById('snow');
            const ctx = canvas.getContext('2d');
            let width = window.innerWidth;
            let height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;

            const flakes = [];
            for(let i=0; i<100; i++) {
                flakes.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    r: Math.random() * 2 + 1,
                    d: Math.random() * 100, // density
                    speed: Math.random() * 1 + 0.5
                });
            }

            function draw() {
                ctx.clearRect(0, 0, width, height);
                ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
                ctx.beginPath();
                for(let i=0; i<flakes.length; i++) {
                    let f = flakes[i];
                    ctx.moveTo(f.x, f.y);
                    ctx.arc(f.x, f.y, f.r, 0, Math.PI*2, true);
                }
                ctx.fill();
                move();
            }

            let angle = 0;
            function move() {
                angle += 0.01;
                for(let i=0; i<flakes.length; i++) {
                    let f = flakes[i];
                    f.y += Math.pow(f.d, 2) + 1; // Speed based on density
                    f.x += Math.sin(angle) * 2;

                    if(f.y > height) {
                        flakes[i] = {x: Math.random()*width, y: -10, r: f.r, d: f.d, speed: f.speed};
                    }
                }
            }

            setInterval(draw, 33);
            
            window.addEventListener('resize', () => {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            });
        }

        window.onload = () => {
            createSnow();
            const editor = document.getElementById('editor');
            editor.addEventListener('input', updateWordCount);
            editor.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key === "Enter") {
                    e.preventDefault();
                    getRhymes();
                }
            });
        };
    </script>
</body>
</html>
