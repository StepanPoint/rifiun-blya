<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIFIUN BLYA v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        body { 
            font-family: 'VT323', monospace; 
            background: #050a10; 
            color: #a3d4ff; 
            overflow-x: hidden;
        }

        /* Эффект старого монитора */
        .crt::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .terminal { 
            background: rgba(10, 20, 35, 0.85); 
            border: 2px solid #00ffcc; 
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2), inset 0 0 20px rgba(0, 255, 204, 0.05);
            backdrop-filter: blur(5px);
        }
        
        .neon { text-shadow: 0 0 5px #00ffcc, 0 0 10px #00ffcc; }
        .neon-pink { text-shadow: 0 0 5px #ff00aa, 0 0 10px #ff00aa; }
        
        textarea { 
            background: transparent; 
            color: #b3e0ff; 
            font-size: 1.5rem; 
            line-height: 1.6; 
            caret-color: #ff00aa;
        }
        
        textarea::placeholder { color: #4a6b8a; }
        
        /* Скроллбар */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a1421; }
        ::-webkit-scrollbar-thumb { background: #00ffcc; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #ff00aa; }

        .snow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        
        .rhyme-tag {
            transition: all 0.2s;
        }
        .rhyme-tag:hover {
            transform: translateX(5px);
            background: rgba(0, 255, 204, 0.1);
            border-color: #ff00aa;
            color: #fff;
            text-shadow: 0 0 8px #ff00aa;
        }
    </style>
</head>
<body class="min-h-screen relative crt">
    <!-- Фон -->
    <div class="fixed inset-0 bg-[url('https://images.unsplash.com/photo-1518066000714-58c45f1a2c0a?q=80&w=2070&auto=format&fit=crop')] bg-cover bg-center opacity-40 grayscale contrast-125"></div>
    <canvas id="snow" class="snow"></canvas>
    <div class="fixed inset-0 bg-gradient-to-b from-[#050a10]/90 via-[#050a10]/60 to-[#050a10]"></div>

    <div class="relative z-10 min-h-screen flex flex-col">
        <header class="border-b border-cyan-500/30 bg-black/80 backdrop-blur-md py-4 sticky top-0 z-50">
            <div class="max-w-6xl mx-auto px-4 md:px-6 flex flex-col md:flex-row justify-between items-center gap-2">
                <h1 class="text-4xl md:text-5xl neon tracking-widest cursor-default select-none">RIFIUN <span class="text-pink-500 neon-pink">BLYA</span></h1>
                <div class="flex items-center gap-4 text-sm md:text-base">
                    <span class="px-3 py-1 border border-cyan-500/50 rounded text-cyan-400 animate-pulse">СИСТЕМА АКТИВНА</span>
                    <p class="text-cyan-600 hidden md:block">POST-APOCALYPSE • 2026</p>
                </div>
            </div>
        </header>

        <main class="flex-1 max-w-6xl mx-auto w-full px-4 md:px-6 py-8 grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Редактор -->
            <div class="lg:col-span-2 flex flex-col h-[60vh] lg:h-auto">
                <div class="terminal rounded-xl p-1 flex-1 flex flex-col relative group">
                    <div class="absolute top-0 left-0 w-full h-8 bg-cyan-900/20 flex items-center px-4 gap-2 border-b border-cyan-500/20">
                        <div class="w-3 h-3 rounded-full bg-red-500/50"></div>
                        <div class="w-3 h-3 rounded-full bg-yellow-500/50"></div>
                        <div class="w-3 h-3 rounded-full bg-green-500/50"></div>
                        <span class="ml-2 text-xs text-cyan-500/70">EDITOR.EXE</span>
                    </div>
                    <textarea id="editor" class="flex-1 p-6 pt-10 outline-none resize-none w-full h-full font-mono" 
                        placeholder="// Начни писать здесь...&#10;// Нажми Ctrl+Enter для поиска рифмы&#10;&#10;Снег засыпает мёртвый город..."></textarea>
                </div>
                <div class="mt-2 flex justify-between text-xs text-cyan-700 px-2">
                    <span id="word-count">СЛОВ: 0</span>
                    <span>CTRL+ENTER = ПОИСК</span>
                </div>
            </div>

            <!-- Панель рифм -->
            <div class="lg:col-span-1 h-full">
                <div class="terminal rounded-xl p-6 h-full flex flex-col">
                    <h2 class="text-2xl mb-6 flex items-center gap-3 text-cyan-300 border-b border-cyan-800 pb-2">
                        <i class="fas fa-satellite-dish animate-pulse"></i> БАЗА РИФМ
                    </h2>
                    
                    <button onclick="getRhymes()" 
                            class="group w-full py-4 bg-cyan-900/30 border border-cyan-500 hover:bg-cyan-500 hover:text-black text-cyan-400 text-xl font-bold rounded-lg mb-6 transition-all duration-300 shadow-[0_0_15px_rgba(0,255,204,0.1)] hover:shadow-[0_0_25px_rgba(0,255,204,0.4)]">
                        <i class="fas fa-search mr-2 group-hover:animate-spin"></i> СКАНИРОВАТЬ
                    </button>

                    <div class="flex-1 overflow-y-auto pr-2">
                        <div id="status" class="text-sm text-gray-500 mb-2 italic h-6"></div>
                        <div id="rhymes" class="space-y-2 text-lg"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Расширенная база для "тяжелых" рифм и исключений
        const heavyRhymes = {
            "снег": ["бег", "век", "плен", "тлен", "день", "тень", "огонь", "конь", "брег", "ночь"],
            "город": ["холод", "голод", "поворот", "лёд", "народ", "вход", "выход", "метод"],
            "ночь": ["дочь", "прочь", "мощь", "ложь", "точь", "помощь", "брошь"],
            "мир": ["пир", "сир", "тир", "эфир", "кумир", "вампиры"],
            "любовь": ["кровь", "вновь", "бровь", "морковь", "основа", "обнов"],
            "глаза": ["гроза", "слеза", "коза", "фраза", "база", "назад", "алмаз"],
            "рука": ["река", "тоска", "мука", "века", "пока", "строка", "знака"]
        };

        // Гласные для определения окончания
        const vowels = ['а', 'е', 'ё', 'и', 'о', 'у', 'ы', 'э', 'ю', 'я'];

        function getLastWord(text) {
            if (!text) return '';
            // Берем последнее слово, игнорируя пунктуацию в конце
            const cleanText = text.trim().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");
            const words = cleanText.split(/\s+/);
            return words[words.length - 1].toLowerCase();
        }

        function getEnding(word) {
            // Находим последнюю гласную и берем хвост слова
            for (let i = word.length - 1; i >= 0; i--) {
                if (vowels.includes(word[i])) {
                    return word.substring(i);
                }
            }
            return word; // Если гласных нет (редко), возвращаем всё
        }

        function updateWordCount() {
            const text = document.getElementById('editor').value;
            const count = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
            document.getElementById('word-count').innerText = `СЛОВ: ${count}`;
        }

        function getRhymes() {
            const text = document.getElementById('editor').value;
            const lastWord = getLastWord(text);
            const rhymesContainer = document.getElementById('rhymes');
            const statusDiv = document.getElementById('status');
            
            rhymesContainer.innerHTML = '';
            
            if (!lastWord) {
                statusDiv.innerText = "ОШИБКА: Пустой буфер ввода";
                statusDiv.className = "text-sm text-red-500 mb-2 h-6";
                return;
            }

            statusDiv.innerText = `ПОИСК ДЛЯ: [${lastWord.toUpperCase()}]...`;
            statusDiv.className = "text-sm text-cyan-400 mb-2 h-6 animate-pulse";

            let foundRhymes = [];

            // 1. Прямое совпадение в базе
            if (heavyRhymes[lastWord]) {
                foundRhymes = heavyRhymes[lastWord];
            } else {
                // 2. Алгоритмический поиск по окончанию
                const targetEnding = getEnding(lastWord);
                
                // Собираем все слова из базы, которые подходят по окончанию
                Object.keys(heavyRhymes).forEach(key => {
                    const keyEnding = getEnding(key);
                    if (keyEnding === targetEnding && key !== lastWord) {
                        // Добавляем само ключевое слово
                        foundRhymes.push(key);
                        // И его рифмы
                        foundRhymes = foundRhymes.concat(heavyRhymes[key]);
                    }
                });

                // Удаляем дубликаты и само слово
                foundRhymes = [...new Set(foundRhymes)].filter(w => w !== lastWord);
                
                // Если ничего не нашли, генерируем "псевдо-рифмы" (для атмосферы)
                if (foundRhymes.length === 0) {
                     foundRhymes = ["тьма", "зима", "луна", "война", "стена", "цена", "вина"];
                     statusDiv.innerText = "ТОЧНЫХ СОВПАДЕНИЙ НЕТ. ЗАГРУЗКА ШУМА...";
                }
            }

            // Отрисовка
            if (foundRhymes.length > 0) {
                statusDiv.innerText = `НАЙДЕНО ВАРИАНТОВ: ${foundRhymes.length}`;
                statusDiv.className = "text-sm text-green-400 mb-2 h-6";
                
                foundRhymes.forEach(rhyme => {
                    const div = document.createElement('div');
                    div.className = "rhyme-tag px-4 py-2 bg-black/60 border border-cyan-900 rounded cursor-pointer flex justify-between items-center group";
                    div.innerHTML = `<span>${rhyme}</span> <i class="fas fa-plus text-xs opacity-0 group-hover:opacity-100 text-pink-500"></i>`;
                    
                    div.onclick = () => {
                        const editor = document.getElementById('editor');
                        // Добавляем пробел, если нужно
                        if (editor.value.length > 0 && !editor.value.endsWith('\n') && !editor.value.endsWith(' ')) {
                            editor.value += " ";
                        }
                        editor.value += rhyme;
                        editor.focus();
                        updateWordCount();
                    };
                    rhymesContainer.appendChild(div);
                });
            }
        }

        // Snow effect improved
        function createSnow() {
            const canvas = document.getElementById('snow');
            const ctx = canvas.getContext('2d');
            
            let width = window.innerWidth;
            let height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;

            const flakes = [];
            const maxFlakes = 150;

            class Snowflake {
                constructor() { this.reset(true); }
                reset(initial = false) {
                    this.x = Math.random() * width;
                    this.y = initial ? Math.random() * height : -10;
                    this.size = Math.random() * 3 + 1;
                    this.speed = Math.random() * 1 + 0.5;
                    this.wind = Math.random() * 0.5 - 0.25;
                    this.opacity = Math.random() * 0.5 + 0.3;
                }
                update() {
                    this.y += this.speed;
                    this.x += this.wind;
                    // Мерцание
                    this.opacity += (Math.random() - 0.5) * 0.05;
                    if (this.opacity < 0.1) this.opacity = 0.1;
                    if (this.opacity > 0.8) this.opacity = 0.8;

                    if (this.y > height) this.reset();
                    if (this.x > width) this.x = 0;
                    if (this.x < 0) this.x = width;
                }
                draw() {
                    ctx.fillStyle = `rgba(220, 240, 255, ${this.opacity})`;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            for (let i = 0; i < maxFlakes; i++) flakes.push(new Snowflake());

            function animate() {
                ctx.clearRect(0, 0, width, height);
                flakes.forEach(f => { f.update(); f.draw(); });
                requestAnimationFrame(animate);
            }
            animate();

            window.addEventListener('resize', () => {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            });
        }

        window.onload = () => {
            createSnow();
            const editor = document.getElementById('editor');
            
            editor.addEventListener('input', updateWordCount);
            
            editor.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key === "Enter") {
                    e.preventDefault();
                    getRhymes();
                }
            });
        };
    </script>
</body>
</html>
