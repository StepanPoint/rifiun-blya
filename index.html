    <script>
        // --- ЗВУКОВОЙ ДВИЖОК ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'click') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05);
                gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);
            } else if (type === 'hover') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.02, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.05);
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);
            } else if (type === 'error') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'success') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
        }

            // --- ПРЕДМЕТЫ ---
            "сигарета": ["лета", "цвета", "монета", "планета", "ракета", "берета", "кассета", "газета"],

            // --- ЦЕНЗУРА / ГРУБОСТЬ (ЗАМЕНА НА РЕШЕТКУ) ---

            "пидор": ["видор", "гидор", "лидор", "индор", "аутдор", "спидор"],
            "мудак": ["призрак", "мрак", "овраг", "шаг", "враг", "флаг"],
            "еб***": ["небо", "хлеба", "треба", "где бы", "где-то", "лето", "светло"],
            "хуй": ["бой", "злой", "покой", "герой", "прибой", "отбой", "разбой", "устой"],
            "пизд***": ["жизнь", "близь", "грязь", "связь", "казнь", "лазнь", "мазь", "пазл"],
            "нахуй": ["махай", "играй", "страдай", "уезжай", "не дыши", "не пиши", "не кричи"],
            "ебало": ["мало", "пало", "стало", "устало", "пропало", "начало", "кончалось"],
            "залупа": ["группа", "триппер", "сиплый", "хриплый", "липкий", "скользкий"],
            
            // --- АБСТРАКТНОЕ / ФИЛОСОФСКОЕ ---
            "смысл": ["высь", "жизнь", "близь", "грязь", "связь", "казнь", "лазнь", "мазь", "пазл"],
            "душа": ["гроза", "слеза", "коза", "фраза", "база", "назад", "алмаз", "экран", "показ"],
            "сердце": ["перце", "мерце", "терце", "герце", "ферце"],
            "разум": ["глазам", "образам", "фразам", "связям", "князьям", "друзьям"],
            "судьба": ["борьба", "гриб", "сруб", "клуб", "зуб", "дуб", "гроб", "труб"]
        };

        const vowels = ['а', 'е', 'ё', 'и', 'о', 'у', 'ы', 'э', 'ю', 'я'];

        function getLastWord(text) {
            if (!text) return '';
            const cleanText = text.trim().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");
            const words = cleanText.split(/\s+/);
            return words[words.length - 1].toLowerCase();
        }

        function getEnding(word) {
            for (let i = word.length - 1; i >= 0; i--) {
                if (vowels.includes(word[i])) {
                    return word.substring(i);
                }
            }
            return word;
        }

        function updateWordCount() {
            const text = document.getElementById('editor').value;
            const count = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
            document.getElementById('word-count').innerText = `WORDS: ${count}`;
        }

        function getRhymes() {
            const text = document.getElementById('editor').value;
            const lastWord = getLastWord(text);
            const container = document.getElementById('rhymes-container');
            const status = document.getElementById('status-line');
            
            container.innerHTML = '';
            playSound('click');

            if (!lastWord) {
                status.innerText = "ERROR: EMPTY_BUFFER";
                status.style.color = "#ff0055";
                playSound('error');
                return;
            }

            status.innerText = `SCANNING_DB_FOR: [${lastWord.toUpperCase()}]...`;
            status.style.color = "#4deeea";

            let found = [];

            // 1. Прямой поиск
            if (rhymeDB[lastWord]) {
                found = rhymeDB[lastWord];
            } else {
                // 2. Поиск по окончанию (алгоритмический)
                const targetEnd = getEnding(lastWord);
                Object.keys(rhymeDB).forEach(key => {
                    if (getEnding(key) === targetEnd && key !== lastWord) {
                        found.push(key);
                        found = found.concat(rhymeDB[key]);
                    }
                });
                found = [...new Set(found)].filter(w => w !== lastWord);
            }

            // 3. Если пусто - депрессивный рандом из общих слов
            if (found.length === 0) {
                found = ["тьма", "зима", "дыра", "нора", "пустота", "ничто", "бетон", "серость", "дождь", "холод"];
                status.innerText = "NO_EXACT_MATCH. LOADING_DEFAULT_SADNESS...";
                playSound('error');
            } else {
                playSound('success');
            }

            // Рендер
            found.forEach((word, index) => {
                setTimeout(() => {
                    const div = document.createElement('div');
                    div.className = "rhyme-item p-2 cursor-pointer text-gray-400 hover:text-white font-mono text-lg flex justify-between";
                    
                    // Добавляем метку источника (для атмосферы)
                    let sourceTag = "";
                    if (word.includes("#")) sourceTag = "<span class='tag-source'>[CENSORED]</span>";
                    else if (rhymeDB[lastWord] && rhymeDB[lastWord].includes(word)) sourceTag = "<span class='tag-source'>[DIRECT]</span>";
                    else sourceTag = "<span class='tag-source'>[ALGO]</span>";

                    div.innerHTML = `<span>> ${word}</span> <div class="flex items-center gap-2">${sourceTag} <i class="fas fa-plus text-xs opacity-0 group-hover:opacity-100 text-[#ff0055]"></i></div>`;
                    
                    div.onmouseenter = () => playSound('hover');
                    div.onclick = () => {
                        const editor = document.getElementById('editor');
                        if (editor.value.length > 0 && !editor.value.endsWith('\n') && !editor.value.endsWith(' ')) {
                            editor.value += " ";
                        }
                        editor.value += word;
                        editor.focus();
                        updateWordCount();
                        playSound('click');
                    };
                    container.appendChild(div);
                }, index * 20); // Быстрая печать списка
            });
        }

        // --- СНЕГ ---
        function createSnow() {
            const canvas = document.getElementById('snow');
            const ctx = canvas.getContext('2d');
            let width = window.innerWidth;
            let height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;

            const flakes = [];
            for(let i=0; i<120; i++) {
                flakes.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    r: Math.random() * 2 + 1,
                    d: Math.random() * 100,
                    speed: Math.random() * 1 + 0.5
                });
            }

            function draw() {
                ctx.clearRect(0, 0, width, height);
                ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
                ctx.beginPath();
                for(let i=0; i<flakes.length; i++) {
                    let f = flakes[i];
                    ctx.moveTo(f.x, f.y);
                    ctx.arc(f.x, f.y, f.r, 0, Math.PI*2, true);
                }
                ctx.fill();
                move();
            }

            let angle = 0;
            function move() {
                angle += 0.01;
                for(let i=0; i<flakes.length; i++) {
                    let f = flakes[i];
                    f.y += Math.pow(f.d, 2) + 1;
                    f.x += Math.sin(angle) * 2;
                    if(f.y > height) {
                        flakes[i] = {x: Math.random()*width, y: -10, r: f.r, d: f.d, speed: f.speed};
                    }
                }
            }
            setInterval(draw, 33);
            
            window.addEventListener('resize', () => {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            });
        }

        window.onload = () => {
            createSnow();
            const editor = document.getElementById('editor');
            editor.addEventListener('input', updateWordCount);
            editor.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key === "Enter") {
                    e.preventDefault();
                    getRhymes();
                }
            });
        };
    </script>
</body>
</html>
