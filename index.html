<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RIFIUN_BLYA_DATABASE_V3</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Courier New', monospace;
      background: #000 url('https://images.unsplash.com/photo-1518066000714-58c45f1a2c0a?q=80&w=2070&auto=format&fit=crop') center/cover fixed;
      color: #0f0;
      min-height: 100vh;
      padding: 20px;
      text-shadow: 0 0 5px #0f0, 0 0 10px rgba(0,255,0,0.5);
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: 
        linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
        repeating-linear-gradient(0deg, rgba(0,50,0,0.1) 0px, rgba(0,50,0,0.1) 1px, transparent 1px, transparent 2px);
      pointer-events: none;
      z-index: -1;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      border: 1px solid #0f0;
      box-shadow: 0 0 20px #0f0, inset 0 0 30px rgba(0,255,0,0.1);
      background: rgba(0, 10, 0, 0.85);
      padding: 20px;
      position: relative;
    }

    .header {
      text-align: center;
      padding: 15px;
      border-bottom: 1px dashed #0f0;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 1.8rem;
      letter-spacing: 3px;
      animation: flicker 3s infinite;
    }

    .header .subtitle {
      font-size: 0.9rem;
      opacity: 0.8;
      margin-top: 5px;
    }

    @keyframes flicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
      20%, 24%, 55% { opacity: 0.6; }
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      padding: 8px 12px;
      background: rgba(0, 30, 0, 0.6);
      border: 1px solid #0a0;
      margin-bottom: 15px;
    }

    .status-bar .hint {
      color: #0f0;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    #results-db {
      min-height: 180px;
      padding: 15px;
      border: 1px solid #0a0;
      background: rgba(0, 20, 0, 0.5);
      line-height: 1.8;
      font-size: 1.1rem;
      cursor: text;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .clickable-word {
      cursor: pointer;
      transition: all 0.15s ease;
      padding: 2px 3px;
      border-radius: 2px;
      display: inline;
    }

    .clickable-word:hover {
      background: rgba(0, 255, 0, 0.3);
      box-shadow: 0 0 8px #0f0;
      text-shadow: 0 0 8px #0f0;
    }

    .word-highlight {
      background: #0f0 !important;
      color: #000 !important;
      font-weight: bold;
      box-shadow: 0 0 12px #0f0, inset 0 0 5px rgba(255,255,255,0.3);
      text-shadow: none !important;
    }

    #rhyme-results {
      margin-top: 20px;
      padding: 12px;
      border-left: 3px solid #0f0;
      background: rgba(0, 30, 0, 0.7);
      min-height: 60px;
      font-size: 0.95rem;
      display: none;
    }

    #rhyme-results.active {
      display: block;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .rhyme-title {
      color: #0f0;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .rhyme-list {
      color: #0c0;
    }

    .rhyme-list span {
      display: inline-block;
      margin: 3px 5px 3px 0;
      padding: 3px 8px;
      background: rgba(0, 100, 0, 0.4);
      border: 1px solid #0a0;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .rhyme-list span:hover {
      background: rgba(0, 255, 0, 0.3);
      border-color: #0f0;
    }

    .quote {
      margin-top: 25px;
      padding-top: 15px;
      border-top: 1px dashed #0a0;
      font-style: italic;
      opacity: 0.85;
      font-size: 0.95rem;
      text-align: center;
    }

    .error {
      color: #f66;
      text-shadow: 0 0 5px #f66;
    }

    .loading {
      color: #0f0;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0.4; }
    }

    /* Scanline effect */
    .container::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(
        to bottom,
        transparent 50%,
        rgba(0, 50, 0, 0.08) 51%,
        transparent 52%
      );
      background-size: 100% 4px;
      pointer-events: none;
      z-index: 1;
    }

    .content-wrapper {
      position: relative;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="content-wrapper">
      <div class="header">
        <h1>RIFIUN BLYA</h1>
        <div class="subtitle">DATABASE_V3 // LOADED // NO_CENSORSHIP_EXCEPT_HASH</div>
      </div>

      <div class="status-bar">
        <span>my_soul.txt <span style="color:#0a0">UNSAVED</span></span>
        <span>WORDS: <span id="word-count">0</span></span>
        <span class="hint">CTRL + ENTER = SCAN СКАНИРОВАТЬ БАЗУ</span>
      </div>

      <div id="results-db">Ожидание ввода...(введи слово и нажми поиск)</div>

      <div id="rhyme-results">
        <div class="rhyme-title">🔍 РИФМЫ:</div>
        <div class="rhyme-list" id="rhyme-list"></div>
      </div>

      <div class="quote">
        "В этом городе даже снег пахнет пеплом и безысходностью."
      </div>
    </div>
  </div>

  <script>
    // === ГЛАВНЫЙ МОДУЛЬ: ВЫДЕЛЕНИЕ СЛОВ + ПОИСК РИФМ ===
    
    const resultsDb = document.getElementById('results-db');
    const rhymeResults = document.getElementById('rhyme-results');
    const rhymeList = document.getElementById('rhyme-list');
    const wordCountEl = document.getElementById('word-count');

    // База рифм по окончаниям (упрощённая для демонстрации)
    // В продакшене можно подключить API или загрузить словарь
    const rhymeDatabase = {
      // Гласные окончания
      'а': ['а', 'я', 'ка', 'та', 'на', 'ма', 'ла', 'да', 'ра', 'жа'],
      'я': ['я', 'мя', 'ня', 'бя', 'вя', 'дя', 'зя', 'ля', 'мя', 'ря'],
      'о': ['о', 'го', 'ло', 'но', 'то', 'со', 'ро', 'ко', 'до', 'по'],
      'е': ['е', 'те', 'не', 'ле', 'ре', 'се', 'ве', 'де', 'ке', 'ме'],
      'и': ['и', 'ти', 'ни', 'ли', 'ри', 'си', 'ви', 'ди', 'ки', 'ми'],
      'ы': ['ы', 'ты', 'ны', 'лы', 'ры', 'сы', 'вы', 'ды', 'кы', 'мы'],
      // Согласные + мягкий знак
      'нь': ['нь', 'день', 'тень', 'сень', 'лень', 'пень', 'зень', 'вень'],
      'ть': ['ть', 'сеть', 'лет', 'цвет', 'свет', 'ответ', 'привет', 'рассвет'],
      'ло': ['ло', 'окно', 'дно', 'оно', 'полно', 'давно', 'смешно', 'волно'],
      'ой': ['ой', 'герой', 'покой', 'бой', 'строй', 'зной', 'душой', 'судьбой'],
      'ай': ['ай', 'край', 'рай', 'май', 'знай', 'давай', 'играй', 'вставай'],
      'ок': ['ок', 'срок', 'восток', 'поток', 'сучок', 'теремок', 'песок'],
      'ас': ['ас', 'класс', 'глаз', 'раз', 'сейчас', 'приказ', 'рассказ'],
      'ет': ['ет', 'свет', 'ответ', 'привет', 'рассвет', 'поэт', 'балет'],
      'ит': ['ит', 'летит', 'горит', 'болит', 'звучит', 'спешит', 'летит'],
      'ать': ['ать', 'знать', 'ждать', 'дать', 'стать', 'брать', 'гнать', 'рвать'],
      'еть': ['еть', 'смотреть', 'лететь', 'гореть', 'уметь', 'терпеть', 'идеть'],
      'ить': ['ить', 'любить', 'жить', 'быть', 'просить', 'носить', 'ходить'],
    };

    // Стоп-слова (не кликабельные)
    const stopWords = new Set([
      'и', 'в', 'на', 'не', 'с', 'к', 'по', 'о', 'а', 'но', 'да', 'же', 'ли',
      'этот', 'эта', 'это', 'эти', 'тот', 'та', 'то', 'те',
      'я', 'ты', 'он', 'она', 'оно', 'мы', 'вы', 'они',
      'мой', 'твой', 'свой', 'наш', 'ваш', 'его', 'её', 'их'
    ]);

    // === ФУНКЦИЯ: Разбивка текста на кликабельные слова ===
    function tokenizeText(text) {
      // Разбиваем на токены: слова, пробелы, знаки препинания
      return text.split(/(\s+|[^\wа-яА-ЯёЁ]+)/).filter(t => t);
    }

    function renderClickableWords(element) {
      const text = element.textContent;
      const tokens = tokenizeText(text);
      
      let wordCount = 0;
      
      element.innerHTML = tokens.map(token => {
        // Проверяем, является ли токен словом (кириллица/латиница + цифры)
        if (/^[\wа-яА-ЯёЁ]+$/.test(token) && token.length >= 2) {
          wordCount++;
          const lower = token.toLowerCase();
          // Пропускаем стоп-слова для кликов (опционально)
          const clickable = !stopWords.has(lower) ? 'clickable-word' : '';
          return `<span class="${clickable}" data-word="${token.replace(/"/g, '&quot;')}" data-original="${token}">${token}</span>`;
        }
        return token; // пробелы и знаки препинания без изменений
      }).join('');

      // Обновляем счётчик слов
      wordCountEl.textContent = wordCount;

      // Навешиваем обработчики кликов
      element.querySelectorAll('.clickable-word').forEach(span => {
        span.addEventListener('click', (e) => {
          e.stopPropagation();
          handleWordClick(e.currentTarget);
        });
      });
    }

    // === ФУНКЦИЯ: Обработка клика по слову ===
    function handleWordClick(element) {
      // Снимаем предыдущее выделение
      document.querySelectorAll('.word-highlight').forEach(el => {
        el.classList.remove('word-highlight');
      });

      // Выделяем текущее слово
      element.classList.add('word-highlight');
      
      const word = element.dataset.original;
      findAndDisplayRhymes(word);
    }

    // === ФУНКЦИЯ: Поиск рифм ===
    function findRhymes(word) {
      const lower = word.toLowerCase();
      const results = new Set();

      // 1. Прямое совпадение в базе по окончанию
      for (const [ending, rhymes] of Object.entries(rhymeDatabase)) {
        if (lower.endsWith(ending)) {
          rhymes.forEach(r => {
            if (r.toLowerCase() !== lower) {
              results.add(r);
            }
          });
          break; // берём первое подходящее окончание
        }
      }

      // 2. Генерация "псевдо-рифм" по последним 2-3 буквам (если база пуста)
      if (results.size === 0 && lower.length >= 3) {
        const suffix = lower.slice(-2);
        const prefixes = ['пр', 'ст', 'кр', 'бр', 'тр', 'др', 'гр', 'зр', 'мр'];
        prefixes.forEach(p => {
          const candidate = p + suffix;
          if (candidate !== lower && candidate.length >= 3) {
            results.add(candidate);
          }
        });
      }

      // 3. Если всё ещё пусто — возвращаем заглушку
      if (results.size === 0) {
        return [`🤔 Для "${word}" рифм не найдено... попробуйте другое слово`];
      }

      return Array.from(results).slice(0, 12); // лимит вывода
    }

    // === ФУНКЦИЯ: Отображение результатов ===
    function findAndDisplayRhymes(word) {
      rhymeResults.classList.add('active');
      rhymeList.innerHTML = '<span class="loading">⚡ СКАНИРОВАНИЕ БАЗЫ РИФМ...</span>';

      // Имитация задержки "поиска" для атмосферы
      setTimeout(() => {
        const rhymes = findRhymes(word);
        
        if (rhymes[0].includes('🤔')) {
          rhymeList.innerHTML = `<span class="error">${rhymes[0]}</span>`;
        } else {
          rhymeList.innerHTML = rhymes.map(r => 
            `<span data-rhyme="${r}">${r}</span>`
          ).join('');
          
          // Клик по рифме — копирует в буфер или выделяет
          rhymeList.querySelectorAll('span[data-rhyme]').forEach(span => {
            span.addEventListener('click', (e) => {
              e.stopPropagation();
              const rhyme = e.currentTarget.dataset.rhyme;
              navigator.clipboard?.writeText(rhyme);
              // Визуальный фидбек
              const original = e.currentTarget.textContent;
              e.currentTarget.textContent = '✓';
              setTimeout(() => {
                e.currentTarget.textContent = original;
              }, 800);
            });
          });
        }
      }, 300);
    }

    // === ФУНКЦИЯ: Поддержка CTRL+ENTER для сканирования выделенного текста ===
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'Enter') {
        e.preventDefault();
        
        // Проверяем, есть ли выделенный текст через Selection API
        const selection = window.getSelection().toString().trim();
        
        if (selection && selection.length >= 2) {
          // Если выделение есть — ищем рифму для него
          findAndDisplayRhymes(selection);
        } else {
          // Иначе — ищем последнее выделенное слово по классу
          const highlighted = document.querySelector('.word-highlight');
          if (highlighted) {
            const word = highlighted.dataset.original;
            findAndDisplayRhymes(word);
          } else {
            // Подсказка
            rhymeResults.classList.add('active');
            rhymeList.innerHTML = '<span class="error">⚠ Выделите слово кликом или текстом для поиска рифмы</span>';
          }
        }
      }
    });

    // === ИНИЦИАЛИЗАЦИЯ ===
    document.addEventListener('DOMContentLoaded', () => {
      // Рендерим кликабельные слова при загрузке
      renderClickableWords(resultsDb);

      // Перерендер при изменении контента (если будет редактирование)
      // resultsDb.addEventListener('input', () => renderClickableWords(resultsDb));

      // Клик вне слов — снимает выделение
      document.addEventListener('click', (e) => {
        if (!e.target.closest('.clickable-word') && !e.target.closest('#rhyme-results')) {
          document.querySelectorAll('.word-highlight').forEach(el => {
            el.classList.remove('word-highlight');
          });
        }
      });

      // Подсказка при первом заходе
      setTimeout(() => {
        if (!document.querySelector('.word-highlight')) {
          rhymeResults.classList.add('active');
          rhymeList.innerHTML = '💡 <em>Кликните на любое слово выше, чтобы найти к нему рифму</em>';
        }
      }, 1500);
    });

    // === ДОПОЛНИТЕЛЬНО: Поддержка вставки текста ===
    // Если планируете динамическую загрузку контента, вызывайте:
    // renderClickableWords(resultsDb);
    // после обновления innerHTML
  </script>
</body>
</html>
